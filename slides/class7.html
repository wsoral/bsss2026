## Model comparison - Bayes factor 

-   Bayes Factor (BF) indicates the relative strength of evidence in the data for two competing theories/models/hypotheses
    -   Example: Alternative hypothesis (`\(H_1\)`) vs. Null hypothesis (`\(H_0\)`)
-   `\(BF\)` ranges from 0 to `\(+\infty\)`
-   `\(BF_{10}\)` to indicate how much more likely the alternative hypothesis compared to the null hypothesis
-   Values `\(&gt; 1\)` support the alternative hypothesis, whereas values `\(&lt; 1\)` support the null hypothesis
-   `\(BF_{01}\)` to indicate how much more likely the null hypothesis compared to the alternative hypothesis
-   `\(BF_{01} = 1/BF_{10}\)`

---

## Model comparison - Bayes factor

|       | BF  |       | Interpretation                 |
|-------|-----|-------|--------------------------------|
| 100   | \&lt;  |       | Extreme evidence for `\(H_1\)`     |
| 30    | \-  | 100   | Very strong evidence for `\(H_1\)` |
| 10    | \-  | 30    | Strong evidence for `\(H_1\)`      |
| 3     | \-  | 10    | Substantial evidence for `\(H_1\)` |
| 1     | \-  | 3     | Anecdotal evidence for `\(H_1\)`   |
|       | 1   |       | No evidence                    |
| 1/3   | \-  | 1     | Anecdotal evidence for `\(H_0\)`   |
| 1/10  | \-  | 1/3   | Substantial evidence for `\(H_0\)` |
| 1/30  | \-  | 1/10  | Strong evidence for `\(H_0\)`      |
| 1/100 | \-  | 1/30  | Very strong evidence for `\(H_0\)` |
|       | \&gt;  | 1/100 | Extreme evidence for `\(H_0\)`     |

## ELPD and LOOIC

`$$p(y_i | y_{-i})$$`
--

`$$elpd_i = log\ p(y_i | y_{-i})$$`
--

`$$elpd_{loo} = \sum_{i=1}^n  log\ p(y_i | y_{-i})$$`

--

`$$LOOIC = -2 * elpd_{loo}$$`

---

## PSIS-LOOIC

`$$log\ p(y_i | y_{-i}) \approx log \left( \frac{\sum_s w_i^{(s)} p(y_i | \theta^{(s)})}{\sum_s w_i^{(s)}} \right)$$`
where:

`$$w^{(s)} = \frac{1}{p(y_i | \theta^{(s)})}$$`

- Some weigths `\(w^{(s)}\)` may be very large and lead to noisy estimator.
- PSIS-LOOIC uses Pareto distribution fitted to the tail of weights to smooth very large values.
- It may not always work properly. See Pareto `\(\hat{k}\)` parameter
  - `\(\hat{k}\)` &lt; 0.5 - great
  - `\(\hat{k}\)` &lt; 0.7 - OK
  - `\(\hat{k}\)` &gt; 0.7 - approximate LOO may not work properly
  
---

## Effective Number of Parameters in PSIS-LOO (`\(p_{\text{loo}}\)`)

**Definition**  
- `\(p_{\text{loo}}\)` = effective number of parameters  
- Measures how much the model adapts to the observed data  

**Intuition**  
- Quantifies **model flexibility / complexity in practice**  
- Not equal to nominal parameter count  
- Reflects **overfitting potential**  


**Computation (conceptually)**  
- Difference between:
  - fit to observed data  
  - fit under leave-one-out prediction  
- `\(p_{\text{loo}} = \sum_i \big(\log p(y_i \mid y) - \log p(y_i \mid y_{-i})\big)\)` 

---

## Effective Number of Parameters in PSIS-LOO (`\(p_{\text{loo}}\)`)

**Interpretation Guidelines**  
- Small → strong regularization, stable model  
- Moderate → good bias–variance trade-off  
- Large → high flexibility, possible overfitting  

Rule of thumb:  
- Compare `\(p_{\text{loo}}\)` **relative to `\(n\)`** (`\(p_{\text{loo}}\)`/n in range [0.1 - 0.5]) and across models  

**Use in Practice**  
- Always interpret **together with `\(elpd_{loo}\)`**  
- Helps assess:
  - whether better predictive fit justifies added complexity  
- Large `\(p_{\text{loo}}\)` + high Pareto `\(k\)` → **LOO may be unreliable**  

**Key Takeaway**  
`\(p_{\text{loo}}\)` = *how many parameters the model effectively uses to fit the data*
